<div id="entries-list">
    {{if .Entries}}
    <div class="overflow-x-auto rounded-xl shadow-sm">
        <table class="table table-zebra bg-base-100 w-full">
            <thead>
                <tr class="bg-base-200 text-base-content/60 text-xs uppercase tracking-wide">
                    <th>Section</th>
                    <th>Category</th>
                    <th>Code</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {{range .Entries}}
                <tr class="hover group">
                    <td class="text-base-content/60 text-sm">{{.SectionName}}</td>
                    <td class="font-medium">{{.CategoryName}}</td>
                    <td>
                        <span class="font-mono text-xs text-base-content/50">{{.ShortCode}}</span>
                    </td>
                    <td>
                        <span class="badge badge-sm
                            {{if eq .Status "confirmed"}}badge-success{{end}}
                            {{if eq .Status "pending"}}badge-warning{{end}}
                            {{if eq .Status "withdrawn"}}badge-error{{end}}">
                            {{.Status}}
                        </span>
                    </td>
                    <td class="text-right">
                        <button class="btn btn-ghost btn-xs btn-square text-error tooltip tooltip-left opacity-0 group-hover:opacity-100 transition-opacity"
                                data-tip="Remove entry"
                                hx-delete="/exhibitors/{{.ExhibitorID}}/entries/{{.EntryID}}"
                                hx-target="#entries-list"
                                hx-swap="outerHTML"
                                hx-confirm="Remove this entry?">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
                            </svg>
                        </button>
                    </td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
    <p class="text-xs text-base-content/30 mt-2 text-right">
        {{len .Entries}} {{if eq (len .Entries) 1}}entry{{else}}entries{{end}}
    </p>
    {{else}}
    <div class="card bg-base-100 shadow-sm">
        <div class="card-body items-center text-center py-10">
            <p class="font-semibold text-base-content/40">No entries yet</p>
            <p class="text-sm text-base-content/30 mt-1">Select a category above to add an entry</p>
        </div>
    </div>
    {{end}}
</div>
